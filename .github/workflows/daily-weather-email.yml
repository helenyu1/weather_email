name: Daily Shanghai Weather Email

on:
  schedule:
    # 17:50 Asia/Shanghai = 09:50 UTC.
    - cron: "50 9 * * *"
  workflow_dispatch:

jobs:
  send-weather-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send weather email
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: 465
          SMTP_USE_SSL: true
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WEATHER_EMAIL_TO: ${{ secrets.WEATHER_EMAIL_TO }}
          WEATHER_EMAIL_HOLIDAYS: ${{ vars.WEATHER_EMAIL_HOLIDAYS }}
          WEATHER_EMAIL_EXTRA_WORKDAYS: ${{ vars.WEATHER_EMAIL_EXTRA_WORKDAYS }}
        run: python daily_shanghai_weather.py
